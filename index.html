<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Combustível</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A56A0;--blue-dark:#0F3A73;--blue-light:#E8F0FB;--text:#0F1B2D;--text2:#4A5568;--text3:#8A96A8;--bg:#F0F4FA;--surface:#fff;--border:#DDE4F0;--red:#D94040;--amber:#E07B00;--green:#1A7A4A}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--blue-dark);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:12px}
.brand-text .name{font-size:15px;font-weight:600;color:#fff}
.brand-text .src{font-size:11px;color:rgba(255,255,255,.45)}
.tbtn{font-family:inherit;font-size:12px;font-weight:500;padding:7px 13px;border:1px solid rgba(255,255,255,.2);border-radius:7px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.tbtn:hover{background:rgba(255,255,255,.18)}
.tbtn.accent{background:var(--blue-dark);border-color:var(--blue-dark)}
.subbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.fg select{font-family:inherit;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);min-width:130px}
.clrbtn{font-family:inherit;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;align-self:flex-end}
.page{max-width:1280px;margin:0 auto;padding:22px 28px}
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:18px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px 17px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.kcard.re::before{background:var(--red)}.kcard.am::before{background:var(--amber)}.kcard.gr::before{background:var(--green)}.kcard.pu::before{background:#6B4FBB}
.klbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:7px}
.kval{font-size:21px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.kdelta{font-size:11px;color:var(--text3)}
.alerts{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.acard{border-radius:10px;padding:13px 16px;border:1px solid transparent;display:flex;align-items:flex-start;gap:12px}
.acard.crit{background:#FEF0F0;border-color:#F5CACA}
.acard.warn{background:#FEF7EC;border-color:#F5DCA0}
.acard.ok{background:#EDFAF3;border-color:#A8E0C0}
.aicon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acard.crit .aicon{background:#F5CACA}.acard.warn .aicon{background:#F5DCA0}.acard.ok .aicon{background:#A8E0C0}
.atitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.acard.crit .atitle{color:var(--red)}.acard.warn .atitle{color:var(--amber)}.acard.ok .atitle{color:var(--green)}
.aval{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.acard.crit .aval{color:var(--red)}.acard.warn .aval{color:var(--amber)}.acard.ok .aval{color:var(--green)}
.asub{font-size:11px;color:var(--text3);line-height:1.4}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:13px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.card-hd .t{font-size:13px;font-weight:700;color:var(--text)}
.csub{font-size:11px;color:var(--text3);margin-bottom:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.top-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--bg)}
.top-n{font-size:11px;color:var(--text3);width:18px;text-align:center;flex-shrink:0;font-weight:700}
.top-lbl{font-size:12px;font-weight:600;min-width:80px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar-wrap{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.top-bar{height:100%;border-radius:3px}
.top-val{font-size:11px;font-weight:700;min-width:76px;text-align:right;color:var(--text)}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.sec-hd .t{font-size:13px;font-weight:700}.sec-hd .s{font-size:11px;color:var(--text3)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.b-ok{background:var(--green-bg);color:var(--green)}.b-warn{background:var(--amber-bg);color:var(--amber)}.b-crit{background:var(--red-bg);color:var(--red)}
.cost-hi{color:var(--red);font-weight:700}
.hint{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;border:2px dashed var(--border);border-radius:12px}
.hint strong{display:block;font-size:15px;color:var(--text2);margin-bottom:8px}
#fileInput{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div style="width:42px;height:42px;border:2px dashed rgba(255,255,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    <div class="brand-text">
      <div class="name">Painel de Combustível</div>
      <div class="src" id="srcLabel">Nenhuma planilha carregada</div>
    </div>
  </div>
  <div style="display:flex;gap:7px">
    <label for="fileInput" class="tbtn" style="cursor:pointer;margin:0">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar planilha
    </label>
    <button class="tbtn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </button>
    <button class="tbtn accent" onclick="window.print()">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Imprimir
    </button>
  </div>
</div>

<div class="subbar">
  <div class="fg"><label>Filial</label><select id="fFilial" onchange="render()"><option value="">Todas</option></select></div>
  <div class="fg"><label>Placa</label><select id="fVei" onchange="render()"><option value="">Todas</option></select></div>
  <div class="fg"><label>Motorista</label><select id="fMot" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Tipo Frota</label><select id="fFrota" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Combustível</label><select id="fComb" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Mês</label><select id="fMes" onchange="render()"><option value="">Todos</option></select></div>
  <button class="clrbtn" onclick="clearFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>Limpar</button>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFile(event)">

<div class="page" id="mainPage">
  <div class="hint"><strong>Nenhuma planilha carregada</strong>Clique em "Importar planilha" para carregar seus dados.</div>
</div>

<script>
let raw = [];
let charts = {};

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  console.log('Arquivo selecionado:', file.name);
  
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      console.log('Lendo arquivo...');
      const wb = XLSX.read(ev.target.result, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval: ''});
      
      console.log('Linhas lidas:', rows.length);
      console.log('Primeira linha:', rows[0]);
      
      if (!rows.length) {
        alert('Planilha vazia');
        return;
      }
      
      raw = parseRows(rows);
      console.log('Registros processados:', raw.length);
      console.log('Primeiro registro:', raw[0]);
      
      if (!raw.length) {
        alert('Nenhum registro válido. Verifique VALOR EMISSAO e LITROS.');
        return;
      }
      
      document.getElementById('srcLabel').textContent = file.name + ' · ' + raw.length.toLocaleString('pt-BR') + ' registros';
      populateSelects();
      render();
    } catch(err) {
      console.error('Erro:', err);
      alert('Erro ao ler arquivo: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseRows(rows) {
  return rows.map(r => {
    const keys = Object.keys(r);
    const getCol = (...terms) => keys.find(k => terms.some(t => k.trim().toUpperCase().replace(/[^A-Z]/g,'').includes(t.toUpperCase().replace(/[^A-Z]/g,''))));
    const getNum = (col) => {
      if (!col) return 0;
      const v = r[col];
      if (typeof v === 'number') return v;
      const s = String(v||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');
      return parseFloat(s) || 0;
    };
    const getStr = (col) => col ? String(r[col]||'').trim() : '';
    
    const placa = getStr(getCol('PLACA'));
    if (!placa || placa.length < 4) return null;
    
    // Data
    const dataCol = getCol('DATATRANSACAO');
    let dt = '—', mes = '—';
    if (dataCol) {
      const v = r[dataCol];
      let dia, m, ano;
      if (typeof v === 'number' && v > 1000) {
        const epoch = new Date(Date.UTC(1899,11,30) + Math.floor(v)*86400000);
        dia = epoch.getUTCDate(); m = epoch.getUTCMonth()+1; ano = epoch.getUTCFullYear();
      } else {
        const s = String(v||'').split(' ')[0];
        if (s.includes('/')) {
          const p = s.split('/');
          dia = parseInt(p[0]); m = parseInt(p[1]); ano = parseInt(p[2]);
        } else if (s.includes('-')) {
          const p = s.split('-');
          ano = parseInt(p[0]); m = parseInt(p[1]); dia = parseInt(p[2]);
        }
      }
      if (dia && m && ano && ano > 2000) {
        dt = String(dia).padStart(2,'0') + '/' + String(m).padStart(2,'0') + '/' + ano;
        mes = String(m).padStart(2,'0') + '/' + ano;
      }
    }
    
    const litros = getNum(getCol('LITROS'));
    const valor = getNum(getCol('VALOREMISSAO','EMISSAO'));
    const odo = getNum(getCol('ODOMETRO','HORIMETRO'));
    const kml = odo>0 && litros>0 ? parseFloat((odo/litros).toFixed(1)) : 0;
    
    return {
      data: dt, mes, filial: getStr(getCol('NOMEREDUZIDO','FILIAL')), placa,
      veiculo: getStr(getCol('MODELOVEICULO','MODELO')),
      motorista: getStr(getCol('NOMEMOTORISTA','MOTORISTA')),
      frota: getStr(getCol('TIPOFROTA','FROTA')),
      combustivel: getStr(getCol('TIPOCOMBUSTIVEL','COMBUSTIVEL')),
      litros, valor, odo, kml
    };
  }).filter(Boolean);
}

function stOf(kml) { return kml>0&&kml<6?'Crítico':kml>0&&kml<8?'Alerta':'Normal'; }
function uniq(arr,k) { return [...new Set(arr.map(r=>r[k]).filter(Boolean))].sort(); }

function populateSelects() {
  ['fFilial','fVei','fMot','fFrota','fComb','fMes'].forEach((id,i)=>{
    const key = ['filial','placa','motorista','frota','combustivel','mes'][i];
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = '<option value="">Todos</option>' + uniq(raw,key).map(v=>`<option${v===cur?' selected':''}>${v}</option>`).join('');
  });
}

function clearFilters() {
  ['fFilial','fVei','fMot','fFrota','fComb','fMes'].forEach(id=>document.getElementById(id).value='');
  render();
}

function filtered() {
  const f = document.getElementById('fFilial').value;
  const v = document.getElementById('fVei').value;
  const mt = document.getElementById('fMot').value;
  const fr = document.getElementById('fFrota').value;
  const c = document.getElementById('fComb').value;
  const m = document.getElementById('fMes').value;
  return raw.filter(r=>(f===''||r.filial===f)&&(v===''||r.placa===v)&&(mt===''||r.motorista===mt)&&(fr===''||r.frota===fr)&&(c===''||r.combustivel===c)&&(m===''||r.mes===m));
}

function render() {
  if (!raw.length) return;
  const d = filtered();
  const page = document.getElementById('mainPage');
  
  // KPIs
  const V = d.reduce((s,r)=>s+r.valor,0);
  const L = d.reduce((s,r)=>s+r.litros,0);
  const veics = new Set(d.map(r=>r.placa)).size;
  const crits = d.filter(r=>stOf(r.kml)==='Crítico').length;
  const warns = d.filter(r=>stOf(r.kml)==='Alerta').length;
  const cur = v => v.toLocaleString('pt-BR', {style:'currency', currency:'BRL', maximumFractionDigits:0});
  
  page.innerHTML = `
    <div class="kgrid">
      <div class="kcard"><div class="klbl">Gasto total</div><div class="kval">${cur(V)}</div><div class="kdelta">no período</div></div>
      <div class="kcard re"><div class="klbl">Custo médio/veículo</div><div class="kval">${veics>0?cur(V/veics):'—'}</div><div class="kdelta">${veics} veículos</div></div>
      <div class="kcard am"><div class="klbl">Preço médio/litro</div><div class="kval">${L>0?'R$'+(V/L).toFixed(2).replace('.',','):'—'}</div><div class="kdelta">média</div></div>
      <div class="kcard gr"><div class="klbl">Total litros</div><div class="kval">${L.toLocaleString('pt-BR',{maximumFractionDigits:0})} L</div><div class="kdelta">no período</div></div>
      <div class="kcard pu"><div class="klbl">Abastecimentos</div><div class="kval">${d.length.toLocaleString('pt-BR')}</div><div class="kdelta">registros</div></div>
    </div>
    
    <div class="alerts">
      <div class="acard crit"><div class="aicon">⚠</div><div><div class="atitle">Crítico</div><div class="aval">${crits}</div><div class="asub">km/L &lt; 6,0</div></div></div>
      <div class="acard warn"><div class="aicon">!</div><div><div class="atitle">Alerta</div><div class="aval">${warns}</div><div class="asub">6,0 ≤ km/L &lt; 8,0</div></div></div>
      <div class="acard ok"><div class="aicon">✓</div><div><div class="atitle">Normal</div><div class="aval">${d.length-crits-warns}</div><div class="asub">km/L ≥ 8,0</div></div></div>
    </div>
    
    <div class="card">
      <div class="sec-hd"><div class="t">Registros de abastecimento</div><div class="s">${d.length.toLocaleString('pt-BR')} registros</div></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Data</th><th>Filial</th><th>Placa</th><th>Motorista</th><th>Combustível</th><th>Litros</th><th>Valor</th><th>R$/L</th><th>km/L</th><th>Status</th></tr></thead>
          <tbody>${d.map((r,i)=>{
            const st = stOf(r.kml);
            return `<tr>
              <td>${r.data}</td><td>${r.filial}</td><td style="font-weight:700">${r.placa}</td>
              <td>${r.motorista}</td><td>${r.combustivel}</td>
              <td>${r.litros.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
              <td>${cur(r.valor)}</td>
              <td>${r.litros>0?'R$'+(r.valor/r.litros).toFixed(2).replace('.',','):'—'}</td>
              <td>${r.kml>0?r.kml.toFixed(1).replace('.',','):'—'}</td>
              <td><span class="badge ${st==='Crítico'?'b-crit':st==='Alerta'?'b-warn':'b-ok'}">${st}</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
