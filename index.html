<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Combustível</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A56A0;--blue-dark:#0F3A73;--blue-light:#E8F0FB;--text:#0F1B2D;--text2:#4A5568;--text3:#8A96A8;--bg:#F0F4FA;--surface:#fff;--border:#DDE4F0;--red:#D94040;--amber:#E07B00;--green:#1A7A4A}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--blue-dark);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:12px}
.brand-text .name{font-size:15px;font-weight:600;color:#fff}
.brand-text .src{font-size:11px;color:rgba(255,255,255,.45)}
.tbtn{font-family:inherit;font-size:12px;font-weight:500;padding:7px 13px;border:1px solid rgba(255,255,255,.2);border-radius:7px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.tbtn:hover{background:rgba(255,255,255,.18)}
.tbtn.accent{background:var(--blue-dark);border-color:var(--blue-dark)}
.subbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.fg select{font-family:inherit;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);min-width:130px}
.clrbtn{font-family:inherit;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;align-self:flex-end}
.page{max-width:1280px;margin:0 auto;padding:22px 28px}
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:18px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px 17px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.kcard.re::before{background:var(--red)}.kcard.am::before{background:var(--amber)}.kcard.gr::before{background:var(--green)}.kcard.pu::before{background:#6B4FBB}
.klbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:7px}
.kval{font-size:21px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.kdelta{font-size:11px;color:var(--text3)}
.alerts{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.acard{border-radius:10px;padding:13px 16px;border:1px solid transparent;display:flex;align-items:flex-start;gap:12px}
.acard.crit{background:#FEF0F0;border-color:#F5CACA}
.acard.warn{background:#FEF7EC;border-color:#F5DCA0}
.acard.ok{background:#EDFAF3;border-color:#A8E0C0}
.atitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.acard.crit .atitle{color:var(--red)}.acard.warn .atitle{color:var(--amber)}.acard.ok .atitle{color:var(--green)}
.aval{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.acard.crit .aval{color:var(--red)}.acard.warn .aval{color:var(--amber)}.acard.ok .aval{color:var(--green)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:13px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.5px}
td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.hint{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;border:2px dashed var(--border);border-radius:12px}
.hint strong{display:block;font-size:15px;color:var(--text2);margin-bottom:8px}
#fileInput{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div style="width:42px;height:42px;border:2px dashed rgba(255,255,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    <div class="brand-text">
      <div class="name">Painel de Combustível</div>
      <div class="src" id="srcLabel">Nenhuma planilha carregada</div>
    </div>
  </div>
  <div style="display:flex;gap:7px">
    <button class="tbtn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar planilha
    </button>
    <button class="tbtn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </button>
    <button class="tbtn accent" onclick="window.print()">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Imprimir
    </button>
  </div>
</div>

<div class="subbar">
  <div class="fg"><label>Filial</label><select id="fFilial" onchange="render()"><option value="">Todas</option></select></div>
  <div class="fg"><label>Placa</label><select id="fVei" onchange="render()"><option value="">Todas</option></select></div>
  <div class="fg"><label>Motorista</label><select id="fMot" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Tipo Frota</label><select id="fFrota" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Combustível</label><select id="fComb" onchange="render()"><option value="">Todos</option></select></div>
  <div class="fg"><label>Mês</label><select id="fMes" onchange="render()"><option value="">Todos</option></select></div>
  <button class="clrbtn" onclick="clearFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>Limpar</button>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFile(event)">

<div class="page" id="mainPage">
  <div class="hint"><strong>Nenhuma planilha carregada</strong>Clique em "Importar planilha" para começar.</div>
</div>

<script>
let raw = [];

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      
      if (!rows.length) {
        alert('Planilha vazia');
        return;
      }
      
      raw = rows.map(r => {
        const keys = Object.keys(r);
        const find = (...terms) => keys.find(k => terms.some(t => k.toUpperCase().includes(t.toUpperCase())));
        const getNum = (key) => {
          if (!key) return 0;
          const v = r[key];
          if (typeof v === 'number') return v;
          const s = String(v||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');
          return parseFloat(s) || 0;
        };
        
        const placa = String(r[find('PLACA')||'']||'').trim();
        if (!placa || placa.length < 4) return null;
        
        const dataRaw = r[find('DATA')];
        let dt = '—', mes = '—';
        if (dataRaw) {
          let dia, m, ano;
          if (typeof dataRaw === 'number' && dataRaw > 1000) {
            const d = new Date(Date.UTC(1899,11,30) + Math.floor(dataRaw)*86400000);
            dia = d.getUTCDate(); m = d.getUTCMonth()+1; ano = d.getUTCFullYear();
          } else {
            const s = String(dataRaw||'').split(' ')[0];
            if (s.includes('/')) {
              const p = s.split('/');
              dia = parseInt(p[0]); m = parseInt(p[1]); ano = parseInt(p[2]);
            }
          }
          if (dia && m && ano && ano > 2000) {
            dt = String(dia).padStart(2,'0') + '/' + String(m).padStart(2,'0') + '/' + ano;
            mes = String(m).padStart(2,'0') + '/' + ano;
          }
        }
        
        const litros = getNum(find('LITROS'));
        const valor = getNum(find('VALOR'));
        const odo = getNum(find('ODOMETRO','HORIMETRO'));
        const kml = odo > 0 && litros > 0 ? (odo/litros).toFixed(1) : 0;
        
        return {
          data: dt, mes,
          filial: String(r[find('NOME','FILIAL')]||'').trim(),
          placa, motorista: String(r[find('MOTORISTA')]||'').trim(),
          frota: String(r[find('FROTA')]||'').trim(),
          combustivel: String(r[find('COMBUSTIVEL')]||'').trim(),
          litros, valor, odo, kml
        };
      }).filter(Boolean);
      
      if (!raw.length) {
        alert('Nenhum registro válido');
        return;
      }
      
      document.getElementById('srcLabel').textContent = file.name + ' · ' + raw.length.toLocaleString('pt-BR') + ' registros';
      populateSelects();
      render();
    } catch(err) {
      alert('Erro: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function uniq(arr, k) { return [...new Set(arr.map(r => r[k]).filter(Boolean))].sort(); }

function populateSelects() {
  const ids = ['fFilial','fVei','fMot','fFrota','fComb','fMes'];
  const keys = ['filial','placa','motorista','frota','combustivel','mes'];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">Todos</option>' + uniq(raw, keys[i]).map(v => `<option>${v}</option>`).join('');
  });
}

function clearFilters() {
  ['fFilial','fVei','fMot','fFrota','fComb','fMes'].forEach(id => document.getElementById(id).value = '');
  render();
}

function filtered() {
  return raw.filter(r => 
    (document.getElementById('fFilial').value === '' || r.filial === document.getElementById('fFilial').value) &&
    (document.getElementById('fVei').value === '' || r.placa === document.getElementById('fVei').value) &&
    (document.getElementById('fMot').value === '' || r.motorista === document.getElementById('fMot').value) &&
    (document.getElementById('fFrota').value === '' || r.frota === document.getElementById('fFrota').value) &&
    (document.getElementById('fComb').value === '' || r.combustivel === document.getElementById('fComb').value) &&
    (document.getElementById('fMes').value === '' || r.mes === document.getElementById('fMes').value)
  );
}

function render() {
  if (!raw.length) return;
  const d = filtered();
  const cur = v => v.toLocaleString('pt-BR', {style:'currency', currency:'BRL', maximumFractionDigits:0});
  const stOf = kml => kml > 0 && kml < 6 ? 'Crítico' : kml > 0 && kml < 8 ? 'Alerta' : 'Normal';
  
  const V = d.reduce((s,r) => s+r.valor, 0);
  const L = d.reduce((s,r) => s+r.litros, 0);
  const veics = new Set(d.map(r => r.placa)).size;
  const crits = d.filter(r => stOf(r.kml) === 'Crítico').length;
  const warns = d.filter(r => stOf(r.kml) === 'Alerta').length;
  
  document.getElementById('mainPage').innerHTML = `
    <div class="kgrid">
      <div class="kcard"><div class="klbl">Gasto total</div><div class="kval">${cur(V)}</div></div>
      <div class="kcard re"><div class="klbl">Custo médio</div><div class="kval">${veics>0?cur(V/veics):'—'}</div></div>
      <div class="kcard am"><div class="klbl">Preço/L</div><div class="kval">${L>0?'R$'+(V/L).toFixed(2).replace('.',','):'—'}</div></div>
      <div class="kcard gr"><div class="klbl">Total litros</div><div class="kval">${L.toLocaleString('pt-BR',{maximumFractionDigits:0})} L</div></div>
      <div class="kcard pu"><div class="klbl">Abastecimentos</div><div class="kval">${d.length.toLocaleString('pt-BR')}</div></div>
    </div>
    
    <div class="alerts">
      <div class="acard crit"><div style="font-size:22px;font-weight:700;color:var(--red)">${crits}</div><div class="atitle">Crítico (km/L < 6,0)</div></div>
      <div class="acard warn"><div style="font-size:22px;font-weight:700;color:var(--amber)">${warns}</div><div class="atitle">Alerta (6,0 ≤ km/L < 8,0)</div></div>
      <div class="acard ok"><div style="font-size:22px;font-weight:700;color:var(--green)">${d.length-crits-warns}</div><div class="atitle">Normal (km/L ≥ 8,0)</div></div>
    </div>
    
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:13px">Registros</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Data</th><th>Filial</th><th>Placa</th><th>Motorista</th><th>Combustível</th><th>Litros</th><th>Valor</th><th>km/L</th><th>Status</th></tr></thead>
          <tbody>${d.map(r => `<tr>
            <td>${r.data}</td><td>${r.filial}</td><td style="font-weight:700">${r.placa}</td>
            <td>${r.motorista}</td><td>${r.combustivel}</td>
            <td>${r.litros.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
            <td>${cur(r.valor)}</td>
            <td>${r.kml}</td>
            <td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:${stOf(r.kml)==='Crítico'?'#FEF0F0':stOf(r.kml)==='Alerta'?'#FEF7EC':'#EDFAF3'};color:${stOf(r.kml)==='Crítico'?'var(--red)':stOf(r.kml)==='Alerta'?'var(--amber)':'var(--green)'}">${stOf(r.kml)}</span></td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function exportCSV() {
  if (!raw.length) { alert('Nenhum dado'); return; }
  const d = filtered();
  const hdr = 'Data,Filial,Placa,Motorista,Combustível,Litros,Valor,km/L,Status\n';
  const rows = d.map(r => [r.data,r.filial,r.placa,r.motorista,r.combustivel,r.litros.toFixed(2),r.valor.toFixed(2),r.kml,r.kml>0&&r.kml<6?'Crítico':r.kml>0&&r.kml<8?'Alerta':'Normal'].join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+hdr+rows], {type:'text/csv;charset=utf-8'}));
  a.download = 'combustivel.csv';
  a.click();
}
</script>

</body>
</html>
